name: CI/CD Pipeline - Backend Preview

on:
  push:
    branches:
      - migration/staging

permissions:
  contents: write

jobs:
  # --- CI JOB: Quality & Build Check ---
  CI-Validation-Preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # The 'lint' and 'build:prod' scripts defined in the original workflow do not exist in 'package.json'.
      # They have been replaced with a 'test' step to validate the code.
      - name: Run Tests
        # This command is adapted from the 'test' script in 'package.json' to run on an Ubuntu environment.
        run: NODE_OPTIONS=--experimental-vm-modules jest

  CD-Push-to-Deploy-Branch:
    name: Push to Zeabur Deploy Branch
    runs-on: ubuntu-latest
    needs: CI-Validation-Preview  # Only runs if CI passes
    environment: Preview
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Push to release/preview branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Force push to deployment branch
          git push origin HEAD:release/preview --force
      
      - name: Deployment triggered
        run: |
          echo "✅ Code pushed to release/preview branch"
          echo "Zeabur will auto-deploy from this branch"