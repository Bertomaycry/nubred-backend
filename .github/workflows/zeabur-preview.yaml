name: CI/CD Pipeline - Backend Preview

on:
  push:
    branches:
      - migration/staging

permissions:
  contents: write

jobs:
  # --- CI JOB: Quality & Build Check ---
  CI-Validation-Preview:
    runs-on: ubuntu-latest
    environment: Preview

    env:
      DATABASE_URL: ${{ secrets.MONGODB_URL }}
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # The previous test step has been replaced with a direct application start, as requested.
      - name: Start Application
        # This command executes the 'start' script from package.json, typically for running the application.
        run: |
          set -e

          # Start server in background and capture logs
          npm start > server.log 2>&1 &
          SERVER_PID=$!

          echo "⏳ Waiting for server to boot..."

          # Wait up to 15 seconds for the log line
          for i in {1..15}; do
            if grep -q "Server running" server.log; then
              echo "✅ Server started successfully"
              kill $SERVER_PID
              wait $SERVER_PID || true
              exit 0
            fi
            sleep 1
          done

          echo "❌ Server did not start in time"
          echo "---- Server logs ----"
          cat server.log
          kill $SERVER_PID
          exit 1

  CD-Push-to-Deploy-Branch:
    name: Push to Zeabur Deploy Branch
    runs-on: ubuntu-latest
    needs: CI-Validation-Preview  # Only runs if CI passes
    environment: Preview
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Push to release/preview branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Force push to deployment branch
          git push origin HEAD:release/preview --force
      
      - name: Deployment triggered
        run: |
          echo "✅ Code pushed to release/preview branch"
          echo "Zeabur will auto-deploy from this branch"